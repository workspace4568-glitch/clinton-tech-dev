<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Clinton Tech Dev Suite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #DC143C; --bg: #050505; --surface: #111; --border: #222;
            --text: #f0f0f0; --muted: #666;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(ellipse at 50% 0%, #DC143C18 0%, transparent 60%);
        }
        .login-card {
            width: 100%; max-width: 420px; padding: 48px 40px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px;
        }
        .login-logo {
            text-align: center; margin-bottom: 36px;
        }
        .login-logo i { font-size: 2.4rem; color: var(--primary); }
        .login-logo h1 {
            font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700;
            margin-top: 12px; color: var(--text);
        }
        .login-logo p { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 0.8rem; font-weight: 600;
            color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em;
        }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; }
        .input-wrap input {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            border-radius: 6px; padding: 12px 14px 12px 40px;
            color: var(--text); font-size: 0.95rem; font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        .input-wrap input:focus { outline: none; border-color: var(--primary); }
        .btn-login {
            width: 100%; background: var(--primary); color: #fff; border: none;
            border-radius: 6px; padding: 14px; font-size: 1rem; font-weight: 600;
            font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 8px;
        }
        .btn-login:hover { background: #b01030; transform: translateY(-1px); }
        .error-msg {
            background: #DC143C18; border: 1px solid #DC143C44; border-radius: 6px;
            padding: 12px 16px; font-size: 0.9rem; color: #ff6b6b; margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px;
        }
        .footer-note { text-align: center; margin-top: 24px; font-size: 0.8rem; color: var(--muted); }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.82rem; color: var(--muted); margin-bottom: 32px;
            transition: color 0.2s; text-decoration: none;
        }
        .back-btn:hover { color: var(--text); }
    </style>
</head>
<body>
    <div class="login-card">
        <a href="/" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Site</a>
        <div class="login-logo">
            <i class="fa-solid fa-shield-halved"></i>
            <h1>Clinton Tech Dev Suite</h1>
            <p>Admin Panel — Restricted Access</p>
        </div>

        {% if error %}
        <div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" placeholder="admin" required autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In to Dashboard
            </button>
        </form>
        <p class="footer-note">Clinton Tech Dev Suite &copy; 2024</p>
    </div>
</body>
</html>
