<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ s.site_name }} — Under Maintenance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh;
               display: flex; align-items: center; justify-content: center; text-align: center; }
        .wrap { max-width: 520px; padding: 40px 24px; }
        .icon { font-size: 3.5rem; color: #DC143C; margin-bottom: 24px; }
        h1 { font-family: 'Syne', sans-serif; font-size: 2.4rem; font-weight: 800; margin-bottom: 16px; }
        p { color: #888; font-size: 1.1rem; line-height: 1.7; }
        .brand { font-size: 0.85rem; color: #444; margin-top: 48px; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="icon"><i class="fa-solid fa-wrench"></i></div>
        <h1>Under Maintenance</h1>
        <p>{{ s.maintenance_message }}</p>
        <div class="brand">{{ s.site_name }} &mdash; Clinton Tech Dev Suite</div>
    </div>
</body>
</html>
