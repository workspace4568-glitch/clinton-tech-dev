<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" width="1400" height="700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DC143C"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="700" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="175" x2="1400" y2="175"/>
    <line x1="0" y1="350" x2="1400" y2="350"/>
    <line x1="0" y1="525" x2="1400" y2="525"/>
    <line x1="350" y1="0" x2="350" y2="700"/>
    <line x1="700" y1="0" x2="700" y2="700"/>
    <line x1="1050" y1="0" x2="1050" y2="700"/>
  </g>
  <!-- Glow orb -->
  <circle cx="900" cy="350" r="280" fill="#DC143C" opacity="0.08"/>
  <circle cx="900" cy="350" r="160" fill="#DC143C" opacity="0.1"/>
  <!-- Decorative bar -->
  <rect x="80" y="280" width="100" height="4" fill="url(#accent)" rx="2"/>
  <!-- Code brackets decoration -->
  <text x="820" y="420" font-family="monospace" font-size="200" fill="#DC143C" opacity="0.07" font-weight="900">{}</text>
  <!-- Label -->
  <text x="80" y="260" font-family="system-ui,sans-serif" font-size="13" fill="#DC143C" letter-spacing="4" font-weight="600">HERO SECTION</text>
  <text x="80" y="320" font-family="system-ui,sans-serif" font-size="52" fill="white" font-weight="800" letter-spacing="-2">Your Headline</text>
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="52" fill="white" font-weight="800" opacity="0.5" letter-spacing="-2">Goes Here</text>
  <text x="82" y="410" font-family="system-ui,sans-serif" font-size="18" fill="white" opacity="0.5">Upload your own hero image to replace this placeholder</text>
</svg>
